<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GD Engine</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; user-select: none; }
        canvas { display: block; background: #111; border-bottom: 4px solid #222; }
        
        /* Main Menus */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 100; }
        .hidden { display: none !important; }
        
        /* Level List Styles */
        #level-sender { width: 400px; height: 300px; overflow-y: auto; background: #222; padding: 20px; border: 2px solid #444; }
        .lvl-item { background: #333; padding: 10px; margin-bottom: 5px; cursor: pointer; display: flex; justify-content: space-between; }
        .lvl-item:hover { background: #444; }

        /* Editor Tabs */
        #editor-gui { position: absolute; bottom: 0; left: 0; right: 0; height: 120px; background: rgba(20,20,20,0.9); display: flex; flex-direction: column; border-top: 2px solid #555; }
        .tabs { display: flex; background: #111; }
        .tab { padding: 8px 20px; cursor: pointer; background: #222; border: 1px solid #333; }
        .tab.active { background: #444; border-bottom: none; }
        .tab-content { flex: 1; display: flex; align-items: center; padding: 10px; gap: 10px; }
        
        /* Buttons */
        .btn { padding: 10px 15px; background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-pause { position: absolute; top: 10px; right: 10px; }
        .btn-blue { background: #007bff; }
        .obj-btn { width: 40px; height: 40px; background: #444; border: 1px solid #666; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>GEOMETRY DASH CLONE</h1>
        <div id="level-sender"></div>
        <div style="margin-top: 20px;">
            <button class="btn btn-blue" onclick="initEditor()">Create New Level</button>
        </div>
    </div>

    <div id="pause-menu" class="overlay hidden">
        <h2>Editor Paused</h2>
        <input type="text" id="lvl-name" placeholder="Level Name" style="padding: 10px; margin: 10px;">
        <input type="number" id="lvl-id" placeholder="Level ID" style="padding: 10px; margin: 10px;">
        <button class="btn" onclick="saveAndUpload()">Save & Upload (.gdlvl)</button>
        <button class="btn btn-blue" style="margin-top: 10px;" onclick="togglePause(false)">Resume</button>
        <button class="btn" style="background: #dc3545; margin-top: 10px;" onclick="location.reload()">Exit to Menu</button>
    </div>

    <button id="pause-trigger" class="btn btn-pause hidden" onclick="togglePause(true)">II</button>

    <div id="editor-gui" class="hidden">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('build')">Build</div>
            <div class="tab" onclick="switchTab('edit')">Edit</div>
            <div class="tab" onclick="switchTab('delete')">Delete</div>
        </div>
        <div id="build-content" class="tab-content">
            <button class="obj-btn" onclick="brush='block'" style="background:#aaa;"></button>
            <button class="obj-btn" onclick="brush='spike'" style="background:#f44; clip-path: polygon(50% 0%, 0% 100%, 100% 100%);"></button>
            <button class="obj-btn" onclick="brush='portal'" style="background:#0f0;"></button>
        </div>
        <div id="edit-content" class="tab-content hidden">
            <span>Select an object to move it (WIP)</span>
        </div>
        <div id="delete-content" class="tab-content hidden">
            <span style="color: #f44;">Click objects to remove them</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = 500;

// Engine State
let state = 'MENU';
let brush = 'block';
let currentTab = 'build';
let currentLevel = [];
let cameraX = 0;
let isPaused = false;

// Physics
const GROUND_Y = 400;
let player = { x: 100, y: GROUND_Y - 30, w: 30, h: 30, dy: 0, mode: 'cube' };

// --- UI Logic ---
function switchTab(t) {
    currentTab = t;
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('build-content').classList.toggle('hidden', t !== 'build');
    document.getElementById('edit-content').classList.toggle('hidden', t !== 'edit');
    document.getElementById('delete-content').classList.toggle('hidden', t !== 'delete');
}

function togglePause(show) {
    isPaused = show;
    document.getElementById('pause-menu').classList.toggle('hidden', !show);
}

// --- Level IO ---
function saveAndUpload() {
    const name = document.getElementById('lvl-name').value || "Unnamed";
    const id = document.getElementById('lvl-id').value || "0";
    
    const levelData = {
        name: name,
        id: id,
        data: currentLevel
    };

    let levels = JSON.parse(localStorage.getItem('gd_cloud') || "[]");
    levels.push(levelData);
    localStorage.setItem('gd_cloud', JSON.stringify(levels));
    
    alert(`Level ${name}.gdlvl saved!`);
    location.reload();
}

function loadSender() {
    const container = document.getElementById('level-sender');
    const levels = JSON.parse(localStorage.getItem('gd_cloud') || "[]");
    container.innerHTML = levels.length ? '' : '<p>No levels uploaded yet.</p>';
    
    levels.forEach((l, index) => {
        const div = document.createElement('div');
        div.className = 'lvl-item';
        div.innerHTML = `<span>#${l.id} - ${l.name}</span> <button class="btn">Play</button>`;
        div.onclick = () => startPlay(l.data);
        container.appendChild(div);
    });
}

// --- Interaction ---
canvas.addEventListener('mousedown', (e) => {
    if (isPaused) return;
    
    const x = e.clientX + cameraX;
    const y = e.clientY;

    if (state === 'EDIT') {
        if (currentTab === 'build') {
            const gx = Math.floor(x / 40) * 40;
            const gy = Math.floor(y / 40) * 40;
            currentLevel.push({ x: gx, y: gy, type: brush });
        } else if (currentTab === 'delete') {
            currentLevel = currentLevel.filter(o => !(x > o.x && x < o.x + 40 && y > o.y && y < o.y + 40));
        }
    } else if (state === 'PLAY') {
        if (player.y >= GROUND_Y - player.h || player.mode === 'ship') {
            player.dy = player.mode === 'cube' ? -12 : -6;
        }
    }
});

// Camera movement in Editor
window.addEventListener('keydown', (e) => {
    if (state === 'EDIT') {
        if (e.key === 'ArrowRight') cameraX += 40;
        if (e.key === 'ArrowLeft') cameraX -= 40;
    }
});

// --- Core Loop ---
function initEditor() {
    state = 'EDIT';
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('editor-gui').classList.remove('hidden');
    document.getElementById('pause-trigger').classList.remove('hidden');
}

function startPlay(data) {
    state = 'PLAY';
    currentLevel = data;
    player = { x: 100, y: GROUND_Y - 30, w: 30, h: 30, dy: 0, mode: 'cube' };
    cameraX = 0;
    document.getElementById('main-menu').classList.add('hidden');
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Background parallax-ish
    ctx.fillStyle = '#222';
    ctx.fillRect(0, GROUND_Y, canvas.width, 200);

    if (state !== 'MENU') {
        if (state === 'PLAY' && !isPaused) {
            player.dy += (player.mode === 'cube' ? 0.7 : 0.3);
            player.y += player.dy;
            player.x += 6;
            cameraX = player.x - 150;

            if (player.y > GROUND_Y - player.h) {
                player.y = GROUND_Y - player.h;
                player.dy = 0;
            }
        }

        // Draw Player
        ctx.fillStyle = player.mode === 'cube' ? '#00fbff' : '#ff00ff';
        ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);

        // Draw Objects
        currentLevel.forEach(o => {
            const sx = o.x - cameraX;
            if (o.type === 'block') {
                ctx.fillStyle = '#555';
                ctx.fillRect(sx, o.y, 40, 40);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(sx, o.y, 40, 40);
            } else if (o.type === 'spike') {
                ctx.fillStyle = '#ff4d4d';
                ctx.beginPath();
                ctx.moveTo(sx, o.y + 40);
                ctx.lineTo(sx + 20, o.y);
                ctx.lineTo(sx + 40, o.y + 40);
                ctx.fill();
            } else if (o.type === 'portal') {
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(sx, o.y, 15, 80);
                if (state === 'PLAY' && player.x + 30 > o.x && player.x < o.x + 15) player.mode = 'ship';
            }
            
            // Death Check
            if (state === 'PLAY' && o.type !== 'portal') {
                if (player.x < o.x + 35 && player.x + 25 > o.x && player.y < o.y + 35 && player.y + 25 > o.y) {
                    startPlay(currentLevel); 
                }
            }
        });
    }

    requestAnimationFrame(draw);
}

loadSender();
draw();
</script>
</body>
</html>
